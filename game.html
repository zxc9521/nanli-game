function hashText(t){
 let h=0;
 t=String(t||"");
 for(let i=0;i<t.length;i++){
  h=(h*31+t.charCodeAt(i))>>>0;
 }
 return h;
}

function opponentArenaSkills(username){
 const h=hashText(username);
 const arr=arenaSkills.map(s=>s.id);
 const picked=[];
 for(let i=0;i<arr.length&&picked.length<4;i++){
  const index=(h+i*7+i*i)%arr.length;
  const id=arr[index];
  if(!picked.includes(id))picked.push(id);
 }
 while(picked.length<4){
  const id=arr[picked.length];
  if(!picked.includes(id))picked.push(id);
 }
 return picked;
}

<script>
const Online = {
  token: localStorage.getItem("nanli_token") || "",
  username: localStorage.getItem("nanli_username") || "",
  inGuild: false,
  lastAnnouncementId: Number(localStorage.getItem("nanli_last_announcement_id") || 0),

  status(text) {
    const box = document.getElementById("onlineStatus");
    if (box) box.textContent = text;
  },

async init() {
  if (this.token) {
    this.status("已登录：" + this.username);
    await this.downloadSave();
  } else {
    this.status("未登录");
  }
  this.loadRanking();
},

  async register() {
    const username = document.getElementById("loginUser").value.trim();
    const password = document.getElementById("loginPass").value;

    if (!username || !password) {
      alert("请先输入用户名和密码");
      return;
    }

    const res = await fetch("/api/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "注册失败");
      return;
    }

    this.token = data.token;
    this.username = data.username;

    localStorage.setItem("nanli_token", this.token);
    localStorage.setItem("nanli_username", this.username);

    this.status("已登录：" + this.username);
    alert("注册并登录成功");
    await this.uploadSave();
  },

  async login() {
    const username = document.getElementById("loginUser").value.trim();
    const password = document.getElementById("loginPass").value;

    if (!username || !password) {
      alert("请先输入用户名和密码");
      return;
    }

    const res = await fetch("/api/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "登录失败");
      return;
    }

    this.token = data.token;
    this.username = data.username;

    localStorage.setItem("nanli_token", this.token);
    localStorage.setItem("nanli_username", this.username);

    this.status("已登录：" + this.username);
    alert("登录成功");
    await this.downloadSave();
this.loadWorldChat();
this.loadPrivateInbox();
this.loadGuildInfo();
this.loadGuildList();
this.loadGuildChat();
this.loadArenaNearby();
  },

  logout() {
    this.token = "";
    this.username = "";
this.inGuild = false;

    localStorage.removeItem("nanli_token");
    localStorage.removeItem("nanli_username");

    this.status("未登录");
    alert("已退出登录");
  },
async uploadSave() {
  if (!this.token) return;
  if (typeof Game === "undefined" || !Game.exportSave) {
    this.status("游戏存档接口未加载");
    return;
  }
  const save = Game.exportSave();
  const res = await fetch("/api/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + this.token
    },
    body: JSON.stringify({
      save,
      updatedAt: Date.now()
    })
  });
  if (!res.ok) {
    this.status("云存档上传失败");
    return;
  }
  this.status("已登录：" + this.username + "，云存档已同步");
},
async downloadSave() {
  if (!this.token) return;
  if (typeof Game === "undefined" || !Game.importSave) {
    this.status("游戏存档接口未加载");
    return;
  }
  const res = await fetch("/api/save", {
    headers: {
      "Authorization": "Bearer " + this.token
    }
  });
  if (!res.ok) {
    this.status("云存档读取失败");
    return;
  }
  const data = await res.json();
  if (!data.save) {
    this.status("已登录：" + this.username + "，暂无云存档");
    return;
  }
  const useCloud = confirm("发现云端存档，是否加载并覆盖当前本地存档？");
if (useCloud) {
  Game.importSave(data.save);
  this.status("已登录：" + this.username + "，云存档已加载");
  alert("已加载云端存档");
} else {
  this.status("已登录：" + this.username + "，已保留本地存档");
}
},
async announce(text) {
  if (!this.token || !text || location.protocol === "file:") return;
  try {
    await fetch("/api/announcement", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + this.token
      },
      body: JSON.stringify({ text })
    });
  } catch {}
},
async loadAnnouncements() {
  if (location.protocol === "file:") return;
  try {
    const res = await fetch("/api/announcement?since=" + this.lastAnnouncementId);
    if (!res.ok) return;
    const rows = await res.json();
    if (!rows.length) return;
    for (const row of rows) {
      this.lastAnnouncementId = Math.max(this.lastAnnouncementId, row.id);
      localStorage.setItem("nanli_last_announcement_id", this.lastAnnouncementId);
      if (typeof Game !== "undefined" && Game.addSystemLog) {
        Game.addSystemLog("【全服通报】" + row.text);
      }
    }
  } catch {}
},
authHeaders() {
  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + this.token
  };
},

chatStatus(text) {
  const box = document.getElementById("chatStatus");
  if (box) box.textContent = text;
},

guildStatus(text) {
  const box = document.getElementById("guildStatus");
  if (box) box.textContent = text;
},

timeText(t) {
  try {
    return new Date(t).toLocaleTimeString();
  } catch {
    return "";
  }
},
escapeHTML(text) {
  return String(text ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
},
nameHTML(username, isGM) {
  const safe = this.escapeHTML(username);
  return Number(isGM)
    ? `<span class="gold">[GM]</span><b>${safe}</b>`
    : `<b>${safe}</b>`;
},
selectPrivateTarget(username) {
  const input = document.getElementById("privateTarget");
  if (input) input.value = username;
},

async sendWorldChat() {
  if (!this.token) return this.chatStatus("请先登录");
  const input = document.getElementById("worldChatInput");
  const text = input ? input.value.trim() : "";
  if (!text) return this.chatStatus("请输入世界聊天内容");

  const res = await fetch("/api/chat/world/send", {
    method: "POST",
    headers: this.authHeaders(),
    body: JSON.stringify({ text })
  });

  const data = await res.json().catch(() => ({}));
  if (!res.ok) return this.chatStatus(data.error || "发送失败");

input.value = "";
this.chatStatus(data.message || "世界消息已发送");
if (data.command) {
  this.loadAnnouncements();
} else {
  this.loadWorldChat();
}
},

async loadWorldChat() {
  if (!this.token) return;
  const box = document.getElementById("worldChatBox");
  if (!box) return;

  const res = await fetch("/api/chat/world/list", {
    headers: {
      "Authorization": "Bearer " + this.token
    }
  });

  const rows = await res.json().catch(() => []);
  const html = rows.map(r => `
  <p>
    <span class="gold">[世界]</span>
    ${this.timeText(r.created_at)}
    ${this.nameHTML(r.from_username, r.from_is_gm)}：

  </p>
`).join("");
if(box.dataset.lastHtml!==html){
 box.innerHTML=html;
 box.dataset.lastHtml=html;
 box.scrollTop=box.scrollHeight;
}
},

async sendPrivateChat() {
  if (!this.token) return this.chatStatus("请先登录");
  const target = document.getElementById("privateTarget")?.value.trim();
  const input = document.getElementById("privateChatInput");
  const text = input ? input.value.trim() : "";

  if (!target) return this.chatStatus("请输入私聊对象");
  if (!text) return this.chatStatus("请输入私聊内容");

  const res = await fetch("/api/chat/private/send", {
    method: "POST",
    headers: this.authHeaders(),
    body: JSON.stringify({
      toUsername: target,
      text
    })
  });

  const data = await res.json().catch(() => ({}));
  if (!res.ok) return this.chatStatus(data.error || "发送失败");

input.value = "";
this.chatStatus(data.message || "私聊已发送");
if (data.command) {
  this.loadAnnouncements();
} else if (this.loadPrivateInbox) {
  this.loadPrivateInbox();
} else {
  this.loadPrivateChat();
}
},

async loadPrivateInbox() {
  if (!this.token) return;

  const box = document.getElementById("privateChatBox");
  if (!box) return;

  const res = await fetch("/api/chat/private/inbox", {
    headers: {
      "Authorization": "Bearer " + this.token
    }
  });

  const rows = await res.json().catch(() => []);

  if (!res.ok) {
    box.innerHTML = "<p class='bad'>读取私聊收件箱失败</p>";
    return;
  }

  if (!rows.length) {
    box.innerHTML = "<p class='muted'>暂无私聊消息。</p>";
    return;
  }

  const html = rows.map(r => {
  const isMe = r.from_username === this.username;
  const other = isMe ? r.to_username : r.from_username;
  const otherIsGM = isMe ? r.to_is_gm : r.from_is_gm;
  const otherSafe = this.escapeHTML(other);
  const text = this.escapeHTML(r.text);

  const otherLabel = Number(otherIsGM)
    ? `[GM]${otherSafe}`
    : otherSafe;

  const otherButton = `<button class="ghost" style="width:auto;padding:2px 7px;margin:0" onclick="Online.selectPrivateTarget('${otherSafe}')">${otherLabel}</button>`;

  const direction = isMe
    ? `<span class="good">我</span> → ${otherButton}`
    : `${otherButton} → <span class="gold">我</span>`;

    return `
      <p>
        <span class="gold">[私聊]</span>
        ${this.timeText(r.created_at)}
        ${direction}：
        ${text}
      </p>
    `;
  }).join("");

  if (box.dataset.lastHtml !== html) {
    box.innerHTML = html;
    box.dataset.lastHtml = html;
    box.scrollTop = box.scrollHeight;
  }
},

}
},

async createGuild() {
  if (!this.token) return this.guildStatus("请先登录");
  const name = document.getElementById("guildNameInput")?.value.trim();
  if (!name) return this.guildStatus("请输入帮会名称");

  const res = await fetch("/api/guild/create", {
    method: "POST",
    headers: this.authHeaders(),
    body: JSON.stringify({ name })
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    return this.guildStatus(data.error || "创建失败");
  }

  if (data.save && typeof Game !== "undefined" && Game.importSave) {
    Game.importSave(data.save);
  }

  this.guildStatus(data.message || "创建成功");
  this.loadGuildInfo();
  this.loadGuildList();
  this.loadGuildChat();
},

async joinGuildFromInput() {
  const name = document.getElementById("guildNameInput")?.value.trim();
  if (!name) return this.guildStatus("请输入要加入的帮会名称");
  this.joinGuild(name);
},

async joinGuild(name) {

  async submitRanking() {
    if (!this.token) {
      this.status("未登录，无法上传战力");
      return;
    }

    if (typeof Game === "undefined") {
      this.status("游戏对象未加载，无法上传战力");
      return;
    }

    if (!Game.getPower || !Game.getLevel || !Game.getVip) {
      this.status("游戏尚未暴露战力接口，请检查第十一步");
      return;
    }

    const res = await fetch("/api/ranking", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + this.token
      },
      body: JSON.stringify({
        power: Game.getPower(),
        level: Game.getLevel(),
        vip: Game.getVip()
      })
    });

    if (res.ok) {
      this.status("已登录：" + this.username + "，战力已上传");
      this.loadRanking();
    } else {
      this.status("上传失败，可能登录已过期");
    }
  },

async claimDailyRankingReward() {
  if (!this.token || !this.username) {
    alert("请先登录账号");
    return;
  }

  const res = await fetch("/api/ranking");
  const rows = await res.json();

  const top5 = rows.slice(0,5);
  const index = top5.findIndex(r => r.username === this.username);

  if (index < 0) {
    alert("你不在排行榜前五，无法领取每日排行奖励");
    return;
  }

  const rank = index + 1;

  if (typeof Game !== "undefined" && Game.claimRankingReward) {
    Game.claimRankingReward(rank);
    await this.uploadSave();
  }
},
arenaSkillName(id) {
  const names = {
    pojun: "破军",
    xuangui: "玄龟",
    jinghua: "镜花",
    qingnang: "青囊",
    tanlang: "贪狼",
    suixing: "碎星",
    shigu: "蚀骨",
    zhuihun: "追魂",
    tianhuo: "天火",
    tiebi: "铁壁",
    guixu: "归墟",
    tianming: "天命"
  };

  return names[id] || id;
},

async saveArenaConfig() {
  if (!this.token) {
    alert("请先登录账号");
    return;
  }

  if (typeof Game === "undefined" || !Game.exportSave) {
    alert("游戏模块未加载");
    return;
  }

  const save = Game.exportSave();
  const skills = Array.isArray(save.arenaSkills) ? save.arenaSkills : [];

  if (skills.length !== 4) {
    alert("请先选择4个竞技场技能");
    return;
  }

  const res = await fetch("/api/arena/config", {
    method: "POST",
    headers: this.authHeaders(),
    body: JSON.stringify({
      skills,
      power: Game.getPower ? Game.getPower() : 0,
      level: Game.getLevel ? Game.getLevel() : 1,
      vip: Game.getVip ? Game.getVip() : 0
    })
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    alert(data.error || "保存竞技配置失败");
    return;
  }

  await this.uploadSave();

  alert(data.message || "竞技场配置已保存");

  this.loadArenaMe();
  this.loadArenaNearby();
  this.loadArenaBattles();
},

async loadArenaMe() {
  if (!this.token) return;

  const res = await fetch("/api/arena/me", {
    headers: {
      "Authorization": "Bearer " + this.token
    }
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok || !data.joined) {
    return;
  }

  const status = document.getElementById("onlineStatus");

  if (status) {
    status.textContent =
      "已登录：" +
      this.username +
      "，竞技场排名 #" +
      data.rank +
      "，今日挑战 " +
      data.arenaUsed +
      "/" +
      data.arenaLimit;
  }
},

async loadArenaBattles() {
  if (!this.token) return;

  const res = await fetch("/api/arena/battles", {
    headers: {
      "Authorization": "Bearer " + this.token
    }
  });

  const rows = await res.json().catch(() => []);

  if (!res.ok || !Array.isArray(rows)) {
    return;
  }

  const logBox = Array.from(document.querySelectorAll(".panel")).find(panel => {
    const h2 = panel.querySelector("h2");
    return h2 && h2.textContent.includes("最近战报");
  })?.querySelector(".log");

  if (!logBox) return;

  if (!rows.length) {
    logBox.innerHTML = "<p class='muted'>暂无服务器战报。</p>";
    return;
  }

  logBox.innerHTML = rows.map(r => {
    const lines = Array.isArray(r.log) ? r.log : [];

    return `
      <p>
        <span class="gold">#${r.id}</span>
        ${new Date(r.createdAt).toLocaleString()}<br>
        ${lines.map(x => this.escapeHTML(x)).join("<br>")}
      </p>
    `;
  }).join("");
},
async loadArenaNearby() {
  const box = document.getElementById("arenaNearbyBox");
  if (!box) return;

  if (!this.token || !this.username) {
    box.innerHTML = "<p class='bad'>请先登录账号。</p>";
    return;
  }

  const res = await fetch("/api/arena/nearby", {
    headers: {
      "Authorization": "Bearer " + this.token
    }
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    box.innerHTML = `
      <div class="card">
        <p class="bad">${this.escapeHTML(data.error || "读取竞技场失败")}</p>
        <p class="muted">请先选择4个竞技场技能，然后点击“保存竞技配置到服务器”。</p>
      </div>
    `;
    return;
  }

  const rows = data.rows || [];

  if (!rows.length) {
    box.innerHTML = "<p class='muted'>你附近暂无可挑战目标。</p>";
    return;
  }

  box.innerHTML = rows.map(r => {
    const skillText = Array.isArray(r.skills) && r.skills.length
      ? r.skills.map(id => this.arenaSkillName(id)).join("、")
      : "未配置";

    return `
      <div class="card">
        <h3>#${r.rank} ${this.escapeHTML(r.username)}</h3>
        <p>
          战力：<b class="gold">${Math.floor(r.power).toLocaleString()}</b><br>
          等级：${r.level}<br>
          VIP：V${r.vip}<br>
          技能：${this.escapeHTML(skillText)}
        </p>
        <button class="goldBtn" onclick="Online.challengeArena(${r.userId})">挑战</button>
      </div>
    `;
  }).join("");
},

previewOpponentSkills(username) {
  if (typeof Game === "undefined") return [];
  const arr = ["pojun","xuangui","jinghua","qingnang","tanlang","suixing","shigu","zhuihun","tianhuo","tiebi","guixu","tianming"];
  let h = 0;
  username = String(username || "");
  for (let i = 0; i < username.length; i++) {
    h = (h * 31 + username.charCodeAt(i)) >>> 0;
  }
  const picked = [];
  for (let i = 0; i < arr.length && picked.length < 4; i++) {
    const id = arr[(h + i * 7 + i * i) % arr.length];
    if (!picked.includes(id)) picked.push(id);
  }
  return picked;
},

async challengeArena(targetUserId) {
  if (!this.token) {
    alert("请先登录账号");
    return;
  }

  const res = await fetch("/api/arena/challenge", {
    method: "POST",
    headers: this.authHeaders(),
    body: JSON.stringify({ targetUserId })
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    alert(data.error || "挑战失败");
    return;
  }

  alert(
    (data.win ? "挑战胜利！" : "挑战失败！") +
    "\n排名：" +
    data.attackerRankBefore +
    " → " +
    data.attackerRankAfter +
    "\n今日次数：" +
    data.arenaUsed +
    "/" +
    data.arenaLimit
  );

  this.loadArenaMe();
  this.loadArenaNearby();
  this.loadArenaBattles();
},

  async loadRanking() {
    const box = document.getElementById("rankingBox");
    if (!box) return;

    const res = await fetch("/api/ranking");
    const allRows = await res.json();
const rows = allRows.slice(0,5);

    if (!rows.length) {
      box.innerHTML = "<p class='muted'>暂无排行榜数据</p>";
      return;
    }

    box.innerHTML = rows.map((r, i) => `
      <div class="card">
        <h3>#${i + 1} ${r.username}</h3>
        <p>
          战力：<b class="gold">${Math.floor(r.power).toLocaleString()}</b><br>
          等级：${r.level}<br>
          VIP：V${r.vip}
        </p>
      </div>
    `).join("");
  }
};
