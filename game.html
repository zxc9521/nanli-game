<script>
const Online = {
  token: localStorage.getItem("nanli_token") || "",
  username: localStorage.getItem("nanli_username") || "",
  lastAnnouncementId: Number(localStorage.getItem("nanli_last_announcement_id") || 0),

  status(text) {
    const box = document.getElementById("onlineStatus");
    if (box) box.textContent = text;
  },

async init() {
  if (this.token) {
    this.status("已登录：" + this.username);
    await this.downloadSave();
  } else {
    this.status("未登录");
  }
  this.loadRanking();
},

  async register() {
    const username = document.getElementById("loginUser").value.trim();
    const password = document.getElementById("loginPass").value;

    if (!username || !password) {
      alert("请先输入用户名和密码");
      return;
    }

    const res = await fetch("/api/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "注册失败");
      return;
    }

    this.token = data.token;
    this.username = data.username;

    localStorage.setItem("nanli_token", this.token);
    localStorage.setItem("nanli_username", this.username);

    this.status("已登录：" + this.username);
    alert("注册并登录成功");
    await this.uploadSave();
  },

  async login() {
    const username = document.getElementById("loginUser").value.trim();
    const password = document.getElementById("loginPass").value;

    if (!username || !password) {
      alert("请先输入用户名和密码");
      return;
    }

    const res = await fetch("/api/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "登录失败");
      return;
    }

    this.token = data.token;
    this.username = data.username;

    localStorage.setItem("nanli_token", this.token);
    localStorage.setItem("nanli_username", this.username);

    this.status("已登录：" + this.username);
    alert("登录成功");
    await this.downloadSave();
this.loadWorldChat();
this.loadGuildInfo();
this.loadGuildList();
this.loadGuildChat();
  },

  logout() {
    this.token = "";
    this.username = "";

    localStorage.removeItem("nanli_token");
    localStorage.removeItem("nanli_username");

    this.status("未登录");
    alert("已退出登录");
  },
async uploadSave() {
  if (!this.token) return;
  if (typeof Game === "undefined" || !Game.exportSave) {
    this.status("游戏存档接口未加载");
    return;
  }
  const save = Game.exportSave();
  const res = await fetch("/api/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + this.token
    },
    body: JSON.stringify({
      save,
      updatedAt: Date.now()
    })
  });
  if (!res.ok) {
    this.status("云存档上传失败");
    return;
  }
  this.status("已登录：" + this.username + "，云存档已同步");
},
async downloadSave() {
  if (!this.token) return;
  if (typeof Game === "undefined" || !Game.importSave) {
    this.status("游戏存档接口未加载");
    return;
  }
  const res = await fetch("/api/save", {
    headers: {
      "Authorization": "Bearer " + this.token
    }
  });
  if (!res.ok) {
    this.status("云存档读取失败");
    return;
  }
  const data = await res.json();
  if (!data.save) {
    this.status("已登录：" + this.username + "，暂无云存档");
    return;
  }
  const useCloud = confirm("发现云端存档，是否加载并覆盖当前本地存档？");
if (useCloud) {
  Game.importSave(data.save);
  this.status("已登录：" + this.username + "，云存档已加载");
  alert("已加载云端存档");
} else {
  this.status("已登录：" + this.username + "，已保留本地存档");
}
},
async announce(text) {
  if (!this.token || !text || location.protocol === "file:") return;
  try {
    await fetch("/api/announcement", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + this.token
      },
      body: JSON.stringify({ text })
    });
  } catch {}
},
async loadAnnouncements() {
  if (location.protocol === "file:") return;
  try {
    const res = await fetch("/api/announcement?since=" + this.lastAnnouncementId);
    if (!res.ok) return;
    const rows = await res.json();
    if (!rows.length) return;
    for (const row of rows) {
      this.lastAnnouncementId = Math.max(this.lastAnnouncementId, row.id);
      localStorage.setItem("nanli_last_announcement_id", this.lastAnnouncementId);
      if (typeof Game !== "undefined" && Game.addSystemLog) {
        Game.addSystemLog("【全服通报】" + row.text);
      }
    }
  } catch {}
},
authHeaders() {
  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + this.token
  };
},

chatStatus(text) {
  const box = document.getElementById("chatStatus");
  if (box) box.textContent = text;
},

guildStatus(text) {
  const box = document.getElementById("guildStatus");
  if (box) box.textContent = text;
},

timeText(t) {
  try {
    return new Date(t).toLocaleTimeString();
  } catch {
    return "";
  }
},

async sendWorldChat() {
  if (!this.token) return this.chatStatus("请先登录");
  const input = document.getElementById("worldChatInput");
  const text = input ? input.value.trim() : "";
  if (!text) return this.chatStatus("请输入世界聊天内容");

  const res = await fetch("/api/chat/world/send", {
    method: "POST",
    headers: this.authHeaders(),
    body: JSON.stringify({ text })
  });

  const data = await res.json().catch(() => ({}));
  if (!res.ok) return this.chatStatus(data.error || "发送失败");

  input.value = "";
  this.chatStatus("世界消息已发送");
  this.loadWorldChat();
},

async loadWorldChat() {
  if (!this.token) return;
  const box = document.getElementById("worldChatBox");
  if (!box) return;

  const res = await fetch("/api/chat/world/list", {
    headers: {
      "Authorization": "Bearer " + this.token
    }
  });

  const rows = await res.json().catch(() => []);
  const html = rows.map(r => `<p><span class="gold">[世界]</span> ${this.timeText(r.created_at)} <b>${r.from_username}</b>：${r.text}</p>`).join("");
if(box.dataset.lastHtml!==html){
 box.innerHTML=html;
 box.dataset.lastHtml=html;
 box.scrollTop=box.scrollHeight;
}
},

async sendPrivateChat() {
  if (!this.token) return this.chatStatus("请先登录");
  const target = document.getElementById("privateTarget")?.value.trim();
  const input = document.getElementById("privateChatInput");
  const text = input ? input.value.trim() : "";

  if (!target) return this.chatStatus("请输入私聊对象");
  if (!text) return this.chatStatus("请输入私聊内容");

  const res = await fetch("/api/chat/private/send", {
    method: "POST",
    headers: this.authHeaders(),
    body: JSON.stringify({
      toUsername: target,
      text
    })
  });

  const data = await res.json().catch(() => ({}));
  if (!res.ok) return this.chatStatus(data.error || "发送失败");

  input.value = "";
  this.chatStatus("私聊已发送");
  this.loadPrivateChat();
},

async loadPrivateChat() {
  if (!this.token) return;
  const target = document.getElementById("privateTarget")?.value.trim();
  const box = document.getElementById("privateChatBox");
  if (!box || !target) return;

  const res = await fetch("/api/chat/private/list?with=" + encodeURIComponent(target), {
    headers: {
      "Authorization": "Bearer " + this.token
    }
  });

  const rows = await res.json().catch(() => []);
  if (!res.ok) {
    box.innerHTML = "<p class='bad'>读取私聊失败</p>";
    return;
  }

const html = rows.map(r => `<p><span class="gold">[私聊]</span> ${this.timeText(r.created_at)} <b>${r.from_username}</b> → <b>${r.to_username}</b>：${r.text}</p>`).join("");
if(box.dataset.lastHtml!==html){
 box.innerHTML=html;
 box.dataset.lastHtml=html;
 box.scrollTop=box.scrollHeight;
}
},

async sendGuildChat() {
  if (!this.token) return this.chatStatus("请先登录");
  const input = document.getElementById("guildChatInput");
  const text = input ? input.value.trim() : "";
  if (!text) return this.chatStatus("请输入帮会聊天内容");

  const res = await fetch("/api/chat/guild/send", {
    method: "POST",
    headers: this.authHeaders(),
    body: JSON.stringify({ text })
  });

  const data = await res.json().catch(() => ({}));
  if (!res.ok) return this.chatStatus(data.error || "发送失败");

  input.value = "";
  this.chatStatus("帮会消息已发送");
  this.loadGuildChat();
},

async loadGuildChat() {
  if (!this.token) return;
  const box = document.getElementById("guildChatBox");
  if (!box) return;

  const res = await fetch("/api/chat/guild/list", {
    headers: {
      "Authorization": "Bearer " + this.token
    }
  });

  const data = await res.json().catch(() => []);
  if (!res.ok) {
    box.innerHTML = "<p class='muted'>你还没有加入帮会，无法查看帮会聊天。</p>";
    return;
  }

const html = data.map(r => `<p><span class="gold">[帮会]</span> ${this.timeText(r.created_at)} <b>${r.from_username}</b>：${r.text}</p>`).join("");
if(box.dataset.lastHtml!==html){
 box.innerHTML=html;
 box.dataset.lastHtml=html;
 box.scrollTop=box.scrollHeight;
}
},

async loadGuildInfo() {
  if (!this.token) return;
  const box = document.getElementById("guildInfoBox");
  if (!box) return;

  const res = await fetch("/api/guild/me", {
    headers: {
      "Authorization": "Bearer " + this.token
    }
  });

  const data = await res.json().catch(() => ({}));

  if (!data.inGuild) {
    box.innerHTML = "<p class='muted'>你还没有加入帮会。</p>";
    return;
  }

  const g = data.guild;
  const members = data.members || [];

const html = `
    <h3>${g.guild_name}</h3>
    <p>会长：${g.leader_username}<br>你的职位：${g.role === "leader" ? "会长" : "成员"}<br>成员数：${members.length}</p>
    <h4>成员列表</h4>
    ${members.map(m => `<p>${m.role === "leader" ? "👑" : "👤"} ${m.username} - ${m.role === "leader" ? "会长" : "成员"}</p>`).join("")}
  `;
if(box.dataset.lastHtml!==html){
 box.innerHTML=html;
 box.dataset.lastHtml=html;
}
},

async loadGuildList() {
  if (!this.token) return;
  const box = document.getElementById("guildListBox");
  if (!box) return;

  const res = await fetch("/api/guild/list", {
    headers: {
      "Authorization": "Bearer " + this.token
    }
  });

  const rows = await res.json().catch(() => []);

  if (!rows.length) {
    box.innerHTML = "<p class='muted'>暂无帮会。</p>";
    return;
  }

const html = rows.map(g => `
    <div class="card">
      <h3>${g.name}</h3>
      <p>会长：${g.leader_username}<br>成员：${g.member_count}</p>
      <button onclick="Online.joinGuild('${g.name}')">加入帮会</button>
    </div>
  `).join("");
if(box.dataset.lastHtml!==html){
 box.innerHTML=html;
 box.dataset.lastHtml=html;
}
},

async createGuild() {
  if (!this.token) return this.guildStatus("请先登录");
  const name = document.getElementById("guildNameInput")?.value.trim();
  if (!name) return this.guildStatus("请输入帮会名称");

  const res = await fetch("/api/guild/create", {
    method: "POST",
    headers: this.authHeaders(),
    body: JSON.stringify({ name })
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    return this.guildStatus(data.error || "创建失败");
  }

  if (data.save && typeof Game !== "undefined" && Game.importSave) {
    Game.importSave(data.save);
  }

  this.guildStatus(data.message || "创建成功");
  this.loadGuildInfo();
  this.loadGuildList();
  this.loadGuildChat();
},

async joinGuildFromInput() {
  const name = document.getElementById("guildNameInput")?.value.trim();
  if (!name) return this.guildStatus("请输入要加入的帮会名称");
  this.joinGuild(name);
},

async joinGuild(name) {
  if (!this.token) return this.guildStatus("请先登录");

  const res = await fetch("/api/guild/join", {
    method: "POST",
    headers: this.authHeaders(),
    body: JSON.stringify({ name })
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    return this.guildStatus(data.error || "加入失败");
  }

  this.guildStatus(data.message || "加入成功");
  this.loadGuildInfo();
  this.loadGuildList();
  this.loadGuildChat();
},

async leaveGuild() {
  if (!this.token) return this.guildStatus("请先登录");

  if (!confirm("确定退出帮会？如果你是唯一会长，将会解散帮会。")) {
    return;
  }

  const res = await fetch("/api/guild/leave", {
    method: "POST",
    headers: this.authHeaders(),
    body: JSON.stringify({})
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    return this.guildStatus(data.error || "操作失败");
  }

  this.guildStatus(data.message || "操作成功");
  this.loadGuildInfo();
  this.loadGuildList();
  this.loadGuildChat();
},
  async submitRanking() {
    if (!this.token) {
      this.status("未登录，无法上传战力");
      return;
    }

    if (typeof Game === "undefined") {
      this.status("游戏对象未加载，无法上传战力");
      return;
    }

    if (!Game.getPower || !Game.getLevel || !Game.getVip) {
      this.status("游戏尚未暴露战力接口，请检查第十一步");
      return;
    }

    const res = await fetch("/api/ranking", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + this.token
      },
      body: JSON.stringify({
        power: Game.getPower(),
        level: Game.getLevel(),
        vip: Game.getVip()
      })
    });

    if (res.ok) {
      this.status("已登录：" + this.username + "，战力已上传");
      this.loadRanking();
    } else {
      this.status("上传失败，可能登录已过期");
    }
  },

  async loadRanking() {
    const box = document.getElementById("rankingBox");
    if (!box) return;

    const res = await fetch("/api/ranking");
    const rows = await res.json();

    if (!rows.length) {
      box.innerHTML = "<p class='muted'>暂无排行榜数据</p>";
      return;
    }

    box.innerHTML = rows.map((r, i) => `
      <div class="card">
        <h3>#${i + 1} ${r.username}</h3>
        <p>
          战力：<b class="gold">${Math.floor(r.power).toLocaleString()}</b><br>
          等级：${r.level}<br>
          VIP：V${r.vip}
        </p>
      </div>
    `).join("");
  }
};

window.addEventListener("load", () => {
  if (location.protocol === "file:") {
    Online.status("离线模式：登录、云存档、排行榜、聊天和帮会不可用");
    return;
  }
  Online.init();
setInterval(() => {
  Online.loadAnnouncements();
  if (document.querySelector("#worldChatBox")) {
    Online.loadWorldChat();
    Online.loadPrivateChat();
    Online.loadGuildChat();
  }
  if (document.querySelector("#guildInfoBox")) {
    Online.loadGuildInfo();
    Online.loadGuildList();
  }
}, 5000);
});
</script>
